<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Janaman ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            background: radial-gradient(circle, #2b0008 0%, #0d0003 100%);
            color: #fff2f4;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        /* Ambient Romantic Background Hearts */
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -100px;
            background-color: rgba(214, 40, 75, 0.4);
            display: inline-block;
            height: 30px;
            margin: 0 10px;
            position: absolute;
            transform: rotate(-45deg);
            width: 30px;
            animation: floatUp 12s linear infinite;
        }

        .heart:before, .heart:after {
            content: "";
            background-color: rgba(214, 40, 75, 0.4);
            border-radius: 50%;
            height: 30px;
            position: absolute;
            width: 30px;
        }

        .heart:before { top: -15px; left: 0; }
        .heart:after { left: 15px; top: 0; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(-45deg); opacity: 0; }
        }

        /* Slide Core Layout */
        .slide-container {
            position: relative;
            width: 95%;
            max-width: 800px;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            padding: 20px;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* Typography Styling */
        h1 {
            font-size: 3.5rem;
            color: #ff4d6d;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
            margin-bottom: 20px;
            line-height: 1.3;
        }

        h2 {
            font-size: 2.8rem;
            color: #ffb3c1;
            line-height: 1.4;
        }

        .highlight {
            color: #ff4d6d;
            font-size: 4rem;
            display: block;
            margin-top: 10px;
        }

        .hint {
            position: absolute;
            bottom: 10px;
            font-size: 0.9rem;
            color: rgba(255, 179, 193, 0.5);
            letter-spacing: 2px;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Slide 4: FIXED Credits/Scroll Container Setup */
        .credits-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            /* Creates a beautiful romantic fade at the top and bottom of the container */
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        .credits-scroll {
            position: absolute;
            width: 100%;
            left: 0;
            padding: 0 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 24px;
            /* Starts hidden below the slide window */
            transform: translateY(85vh); 
        }

        /* FIXED: Triggered when Slide 4 goes active. Scrolls the list perfectly up to its exact end (-100%) */
        .active .credits-scroll {
            animation: scrollUpAllReasons 75s linear forwards;
        }

        .reason-item {
            font-size: 1.4rem;
            line-height: 1.8;
            color: #fff2f4;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .reason-item span {
            color: #ff4d6d;
            font-weight: bold;
            margin-right: 8px;
        }

        /* FIXED ANIMATION: Translates based on the total calculated height of the list container */
        @keyframes scrollUpAllReasons {
            0% {
                transform: translateY(80vh);
            }
            100% {
                transform: translateY(-100%);
            }
        }
    </style>
</head>
<body>

    <!-- Floating Background Hearts -->
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="slide-container">
        <!-- Slide 1 -->
        <div class="slide active">
            <h1>Hey, Janaman...</h1>
            <h2>3 reasons why I love you...</h2>
            <div class="hint">Tap anywhere to continue ❤️</div>
        </div>

        <!-- Slide 2 -->
        <div class="slide">
            <h2>1. Your smile.</h2>
            <div class="hint">Tap to continue ❤️</div>
        </div>

        <!-- Slide 3 -->
        <div class="slide">
            <h2>2. You think there are only <br><span class="highlight">3 reasons? 🤣🤣</span></h2>
            <div class="hint">Tap for the truth ❤️</div>
        </div>

        <!-- Slide 4: Scrolling Text (Completely Fixed!) -->
        <div class="slide">
            <div class="credits-container">
                <div class="credits-scroll" id="reasonsList">
                    <!-- Reasons dynamically injected here via JS -->
                </div>
            </div>
            <div class="hint" style="bottom: -15px; font-size: 0.75rem;">Tap to replay ❤️</div>
        </div>
    </div>

    <script>
        // Your beautifully updated custom list of 98 reasons
        const reasons = [
            "Your smile brightens my day.", "You always know how to make me laugh.", "Your kindness inspires me.", 
            "You listen to me with genuine interest.", "You support my dreams.", "You have the most beautiful eyes.", 
            "You make me feel safe.", "You are incredibly thoughtful.", 
            "You bring out the best in me.", "You're my best friend.", "You accept me as I am.", 
            "Your love for adventure.", "The way you care for others.", "Your creativity amazes me.", 
            "You make even the ordinary moments special.", "Your sense of humor.", "The way you look at me.", 
            "You are so patient.", "You never give up on us.", "You are my moon which more beautiful than moon in real.", 
            "Your intelligence.", "You're my confidant.", "You surprise me in the best ways.", 
            "You're always up for trying new things.", "Your optimism is contagious.", "You're incredibly hardworking.", 
            "Your loyalty.", "You make me feel appreciated.", "Your laugh is infectious.", 
            "You make me a better person.", "Your sense of adventure.", "You're always there when I need you.", 
            "Your passion for life.", "Your love for me, and especially jealousy.", "You're an amazing listener.", 
            "Your generosity.", "You respect me.", "You're honest with me.", "Your way to listen my romantic scenes.", 
            "You make me feel cherished.", "Your kisses are magical.", "You're my favorite person.", 
            "Your resilience.", "Your dirty mind.", "Your strength.", "You make me feel alive.", 
            "Your dedication to our relationship.", "You're always honest with me.", "Your warm heart.", 
            "You make everyday brighter.", "Your voice msg of today.", "You're my soulmate.", "Your sense of adventure.", 
            "You always have the best ideas.", "You're my inspiration.", "Your selflessness.", 
            "You understand me.", "Your talks about others.", "Your positive attitude.", "You're so caring.", 
            "You're my comfort.", "Your smile is contagious.", "You're my partner in everything.", 
            "Your laugh makes me happy.", "You're my hamsafar.", "You are my madam jiiiii forever.", "You make me feel loved.", 
            "You're incredibly thoughtful.", "You always make time for me.", "You're my favorite person to talk to.", 
            "You make me feel important.", "Your loyalty means the world to me.", "You're my best friend and lover.", 
            "You're my constant support.", "Your warmth.", "You make me feel understood.", "You're my perfect match.", 
            "Your patience with me.", "You're my biggest fan.", "You make me laugh like no one else.", 
            "Your loving nature.", "You make life fun.", "You're always there for me.", "Your thoughtfulness.", 
            "You make my heart skip a beat.", "You're my everything.", "Your encouragement.", "You're my greatest adventure.", 
            "You make me feel, I am with you.", "Your tenderness.", "You make me smile.", "Your dedication to us.", 
            "You're my forever.", "You make life worth living.", "You're my reason to smile.", "You make me feel complete.", 
            "Your love is my strength.", "You're my one and only true love."
        ];

        // Inject all 98 elements safely into the HTML
        const listContainer = document.getElementById('reasonsList');
        reasons.forEach((reason, index) => {
            const div = document.createElement('div');
            div.className = 'reason-item';
            div.innerHTML = `<span>${index + 1}.</span> ${reason}`;
            listContainer.appendChild(div);
        });

        // Setup Slide Navigation
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        document.body.addEventListener('click', () => {
            slides[currentSlide].classList.remove('active');
            
            if (currentSlide < slides.length - 1) {
                currentSlide++;
            } else {
                // If they click on the last screen, it resets to the first slide
                currentSlide = 0;
                
                // Force reset the scroll animation so it starts perfectly from the bottom next time
                const scrollEl = document.querySelector('.credits-scroll');
                scrollEl.style.animation = 'none';
                scrollEl.offsetHeight; /* triggers an invisible browser layout refresh */
                scrollEl.style.animation = null;
            }
            
            slides[currentSlide].classList.add('active');
        });

        // Ambient Floating Background Hearts
        const heartsBg = document.getElementById('heartsBg');
        for (let i = 0; i < 35; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 10 + 's';
            const size = Math.random() * 15 + 15;
            heart.style.width = size + 'px';
            heart.style.height = size + 'px';
            heartsBg.appendChild(heart);
        }
    </script>
</body>
</html>
